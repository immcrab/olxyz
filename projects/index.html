<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lilita One', sans-serif;
            margin: 0;
            padding: 50px 20px;
            background-color: #1a1a1a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #ffffff;
            color: #1a1a1a;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1.2rem;
            border: 4px solid #c5ffea;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 0px #c5ffea;
            z-index: 10;
        }

        .home-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #c5ffea;
            background: #c5ffea;
        }

        h1 {
            font-size: clamp(60px, 15vw, 150px);
            margin: 20px 0 0 0;
            text-transform: uppercase;
            text-shadow: 8px 8px 0px #c5ffea;
            -webkit-text-stroke: 2px #c5ffea;
            color: transparent;
            letter-spacing: 4px;
            text-align: center;
        }

        p {
            font-size: 1.5rem;
            color: #1a1a1a;
            margin-bottom: 60px;
            background: #c5ffea;
            padding: 5px 15px;
            transform: rotate(-1deg);
        }

        .project-container {
            position: relative;
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
        }

        .vdo1 {
            border: 8px solid #ffffff;
            border-radius: 20px;
            rotate: -5deg;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 20px 20px 0px rgba(197, 255, 234, 0.2);
            z-index: 2;
            background: #000;
        }

        .vdo1:hover {
            rotate: 0deg;
            scale: 1.02;
            box-shadow: 0px 0px 30px #c5ffea;
            border-color: #c5ffea;
        }

        .yt-button {
            margin-top: 40px;
            background: #ff0000;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 4px solid #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0px 10px 0px #8b0000;
            z-index: 3;
        }

        .yt-button:hover {
            transform: translateY(-5px);
            box-shadow: 0px 15px 0px #8b0000;
            background: #ff2e2e;
        }

        .yt-button:active {
            transform: translateY(2px);
            box-shadow: 0px 5px 0px #8b0000;
        }

        .whitearrow {
            position: absolute;
            top: -60px;
            right: 10%;
            rotate: 150deg;
            filter: drop-shadow(5px 5px 0px #c5ffea);
            z-index: 1;
            pointer-events: none;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        @media (max-width: 600px) {
            .whitearrow { display: none; }
            .home-btn { position: relative; top: 0; left: 0; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="home-btn">← Home</a>

    <h1>My Projects</h1>
    <p>Check out what I've been building</p>

    <div class="project-container">
        <div class="vdo1"><video class="vdo1" width="300" height="533" controls>
            <source src="../resources/Projects/projectv1.mp4" type="video/mp4">
            Your browser doesn't support this video player.
        </video>
    </div>
        

        <a href="https://www.youtube.com/shorts/_0x4eMUf3ZE" target="_blank" class="yt-button">
            View on YouTube
        </a>
        
        <img class="whitearrow" src="../resources/Images/whitearrow.webp" alt="Arrow Decor" width="120">
    </div>

</body>
</html>
