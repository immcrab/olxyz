<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwenLee.XYZ | Home Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lilita One', sans-serif;
            margin: 0;
            padding: 80px 20px;
            background-color: #1a1a1a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }

        h1 {
            font-size: clamp(40px, 8vw, 100px);
            margin: 20px 0;
            text-transform: uppercase;
            text-shadow: 6px 6px 0px #c5ffea;
            -webkit-text-stroke: 1.5px #c5ffea;
            color: transparent;
            letter-spacing: 2px;
            line-height: 1;
        }

        h2 {
            color: #c5ffea;
            font-size: 2.5rem;
            margin-top: 50px;
            background: rgba(197, 255, 234, 0.1);
            padding: 5px 20px;
            border-radius: 10px;
            display: inline-block;
        }

        p {
            color: #e2e2e2;
            max-width: 700px;
            line-height: 1.4;
            font-size: 1.4rem;
        }

        a {
            color: #c5ffea;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        a:hover {
            transform: scale(1.1) rotate(2deg);
            text-shadow: 0 0 10px #c5ffea;
        }

        .introduction {
            margin-top: 20px;
            background: #252525;
            padding: 30px;
            border-radius: 20px;
            border: 3px dashed #444;
        }

        .biggerfont {
            font-size: 1.8rem;
            background: #c5ffea;
            color: #1a1a1a;
            padding: 15px 25px;
            border-radius: 50px;
            transform: rotate(-1deg);
            margin-top: 20px;
        }

        .biggerfont a {
            color: #1a1a1a;
            text-decoration: underline;
        }

        .projects-link {
            margin-top: 80px;
        }

        .projects-link a {
            font-size: 3rem;
            -webkit-text-stroke: 1px #ffffff;
            color: #c5ffea;
            text-shadow: 5px 5px 0px #333;
        }

        .ender {
            font-size: 1.1rem;
            color: #666;
            margin-top: 100px;
            letter-spacing: 2px;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .highlight {
            border: 2px solid #c5ffea;
            padding: 0 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1 class="reveal">Welcome to OwenLee.XYZ</h1>

    <h2 class="reveal">About Me</h2>

    <div class="introduction reveal">
        <p>My name is <span style="color:#c5ffea">Owen</span>. I am a 11-year-old <a href="https://wikipedia.org/wiki/HTML" class="highlight">HTML developer</a> I like to build cool websites (kidna like this). Porkbun is my personal favorite domain registrar.</p>
    </div>
    
    <h2 class="reveal">Contact Me</h2>

    <div class="biggerfont reveal">
        <i><a href="mailto:owenleemail@proton.me">owenleemail@proton.me</a></i>
    </div>

    <div class="projects-link reveal">
        <h1><a href="https://projects.owenlee.xyz">See My Projects →</a></h1>
    </div>

    <p class="ender reveal">© 2026 OwenLee.XYZ</p>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, {
            threshold: 0.1
        });

        const hiddenElements = document.querySelectorAll('.reveal');
        hiddenElements.forEach((el) => observer.observe(el));
    </script>
</body>
</html>
