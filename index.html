<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OwenLee.XYZ | Home Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="resources\Images\favicon.png">
    <style>
        body {
            font-family: 'Lilita One', sans-serif;
            margin: 0;
            padding: 120px 20px 80px 20px;
            background-color: #1a1a1a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
        }

        .nav-bar {
            position: fixed;
            top: 0;
            right: 0;
            padding: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .auth-btn {
            font-family: 'Lilita One', sans-serif;
            background: #c5ffea;
            color: #1a1a1a;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            box-shadow: 4px 4px 0px #333;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0px #333;
            background: #ffffff;
        }

        .user-info {
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 50px;
            border: 1px solid #c5ffea;
        }

        .user-info img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        h1 {
            font-size: clamp(40px, 8vw, 100px);
            margin: 20px 0;
            text-transform: uppercase;
            text-shadow: 6px 6px 0px #c5ffea;
            -webkit-text-stroke: 1.5px #c5ffea;
            color: transparent;
            letter-spacing: 2px;
            line-height: 1;
        }

        h2 {
            color: #c5ffea;
            font-size: 2.5rem;
            margin-top: 50px;
            background: rgba(197, 255, 234, 0.1);
            padding: 5px 20px;
            border-radius: 10px;
            display: inline-block;
        }

        p {
            color: #e2e2e2;
            max-width: 700px;
            line-height: 1.4;
            font-size: 1.4rem;
        }

        a {
            color: #c5ffea;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        a:hover {
            transform: scale(1.1) rotate(2deg);
            text-shadow: 0 0 10px #c5ffea;
        }

        .introduction {
            margin-top: 20px;
            background: #252525;
            padding: 30px;
            border-radius: 20px;
            border: 3px dashed #444;
        }

        .biggerfont {
            font-size: 1.8rem;
            background: #c5ffea;
            color: #1a1a1a;
            padding: 15px 25px;
            border-radius: 50px;
            transform: rotate(-1deg);
            margin-top: 20px;
        }

        .projects-link a {
            font-size: 3rem;
            -webkit-text-stroke: 1px #ffffff;
            color: #c5ffea;
            text-shadow: 5px 5px 0px #333;
        }

        .ender {
            font-size: 1.1rem;
            color: #666;
            margin-top: 100px;
            letter-spacing: 2px;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .highlight {
            border: 2px solid #c5ffea;
            padding: 0 5px;
            border-radius: 5px;
        }
        .owenimg1 {
            margin-left: -100px;
            width: 325px;
            border-radius: 20px;
            margin-top: 20px;
            border: 3px solid #c5ffea;
        }
        .owenimg2 {
            margin-left: 368px;
            width: 389px;
            border-radius: 20px;
            margin-top: 20px;
            border: 3px solid #c5ffea;
        }
        .owenimg3 {
            margin-left: -380px;
            width: 325px;
            border-radius: 20px;
            margin-top: -299px;
            border: 3px solid #c5ffea;
        }
    </style>
</head>
<body>

    <h5 class="reveal" style="font-size: 1.3rem; color: #ffffff; margin-bottom: -10px;">Version 1.0.8</h5>

    <div class="nav-bar">
        <button id="loginBtn" class="auth-btn">LOGIN / SIGN UP</button>
        <div id="userInfo" class="user-info">
            <img id="userPic" src="" alt="User">
            <span id="userName" style="color: #c5ffea;"></span>
            <button id="logoutBtn" class="auth-btn" style="padding: 5px 10px; font-size: 0.8rem;">LOGOUT</button>
        </div>
    </div>

    <h1 class="reveal">Welcome to OwenLee.XYZ</h1>

    <h2 class="reveal">About Me</h2> 

    <img class="owenimg1 reveal" src="resources\Images\Owen/owen1.png" alt="Owen">
    <img class="owenimg2 reveal" src="resources\Images\Owen/owen2.jpg" alt="Owen">
    <img class="owenimg3 reveal" src="resources\Images\Owen/owen3.jpg" alt="Owen">

    <div class="introduction reveal">
        <p>My name is <span style="color:#c5ffea">Owen</span>. I am a 11-year-old <a href="https://wikipedia.org/wiki/HTML" class="highlight">HTML developer</a>. I like to build cool websites (kinda like this). Porkbun is my personal favorite domain registrar.</p>
    </div>
    
    <h2 class="reveal">Contact Me</h2>

    <div class="biggerfont reveal">
        <b><a href="mailto:owen@owenlee.xyz" style="color: #1a1a1a;">owen@owenlee.xyz</a></b>
    </div>

    <div class="projects-link reveal">
        <h1><a href="https://projects.owenlee.xyz">See My Projects →</a></h1>
    </div>

    <br><br>

    <div class="betabutton reveal">
        <a href="https://beta.owenlee.xyz" class="auth-btn" style="font-size: 1.5rem; padding: 15px 30px;">Check out my beta projects!</a>
    </div>

    <p class="ender reveal">© 2026 OwenLee.XYZ</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4ajU8m2BwQuURWAEg77KWECpa1i7VM6c",
            authDomain: "owenleexyz-api.firebaseapp.com",
            databaseURL: "https://owenleexyz-api-default-rtdb.firebaseio.com",
            projectId: "owenleexyz-api",
            storageBucket: "owenleexyz-api.firebasestorage.app",
            messagingSenderId: "616093813686",
            appId: "1:616093813686:web:b244e945a87143c09ccf17",
            measurementId: "G-P12WVBCSLB"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userInfo = document.getElementById('userInfo');
        const userName = document.getElementById('userName');
        const userPic = document.getElementById('userPic');

        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then((result) => console.log("Logged in!"))
                .catch((error) => console.error(error));
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth);
        });
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                userName.innerText = user.displayName.split(' ')[0];
                userPic.src = user.photoURL;
            } else {
                loginBtn.style.display = 'block';
                userInfo.style.display = 'none';
            }
        });
    </script>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));
    </script>
</body>
</html>
