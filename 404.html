<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3;url=https://404.owenlee.xyz">
    <title>OwenLee.XYZ | Redirecting...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lilita One', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: clamp(40px, 8vw, 80px);
            margin: 10px 0;
            text-transform: uppercase;
            text-shadow: 5px 5px 0px #c5ffea;
            -webkit-text-stroke: 1.5px #c5ffea;
            color: transparent;
        }

        p {
            font-size: 1.4rem;
            color: #e2e2e2;
            margin-bottom: 30px;
        }

        .loader {
            border: 5px solid #333;
            border-top: 5px solid #c5ffea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        a {
            color: #c5ffea;
            text-decoration: none;
            border-bottom: 2px dashed #c5ffea;
            transition: 0.3s;
        }

        a:hover {
            color: white;
            border-bottom-color: white;
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h1>Moving Pages...</h1>
    <p>Taking you to the new destination.</p>
    
    <p style="font-size: 1rem; color: #666;">
        Not moving? <a href="https://404.owenlee.xyz">Click here to jump.</a>
    </p>

</body>
</html>
